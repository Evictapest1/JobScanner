<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Evict-A-Pest · Job Scanner</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --green: #2d6a4f;
    --green-dark: #1a3a2a;
    --green-light: #d1fae5;
    --accent: #52b788;
    --warn: #f59e0b;
    --warn-bg: #fffbeb;
    --warn-border: #fcd34d;
    --dark: #0f172a;
    --mid: #475569;
    --light: #f1f5f9;
    --card: #ffffff;
    --border: #e2e8f0;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body { font-family: 'DM Sans', sans-serif; background: var(--light); color: var(--dark); min-height: 100vh; }

  /* ── HOME ── */
  #home {
    min-height: 100vh;
    background: linear-gradient(160deg, #071810 0%, var(--green-dark) 55%, #0f172a 100%);
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    padding: 32px 24px; text-align: center;
  }
  .logo-wrap { margin-bottom: 40px; }
  .logo-icon { font-size: 56px; display: block; margin-bottom: 12px; filter: drop-shadow(0 4px 24px rgba(82,183,136,0.4)); }
  .logo-title { font-family: 'Syne', sans-serif; font-size: 30px; color: #fff; letter-spacing: -0.02em; }
  .logo-sub { font-size: 14px; color: var(--accent); margin-top: 6px; letter-spacing: 0.05em; }

  .scan-btn {
    width: 100%; max-width: 320px;
    background: var(--green);
    color: #fff; border: none; border-radius: 20px;
    padding: 22px 32px; font-size: 18px; font-weight: 700;
    font-family: 'DM Sans', sans-serif;
    cursor: pointer; letter-spacing: 0.01em;
    box-shadow: 0 8px 40px rgba(45,106,79,0.5);
    transition: transform 0.15s, box-shadow 0.15s;
    display: flex; align-items: center; justify-content: center; gap: 10px;
  }
  .scan-btn:active { transform: scale(0.97); box-shadow: 0 4px 20px rgba(45,106,79,0.4); }
  .scan-hint { color: rgba(255,255,255,0.4); font-size: 13px; margin-top: 14px; }

  /* ── SCANNING ── */
  #scanning {
    min-height: 100vh;
    background: linear-gradient(160deg, #071810 0%, var(--green-dark) 100%);
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 16px; padding: 24px; text-align: center;
  }
  .scan-icon { font-size: 52px; animation: float 2s ease-in-out infinite; }
  @keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-8px)} }
  .scan-title { font-family: 'Syne', sans-serif; font-size: 22px; color: #fff; }
  .scan-desc { font-size: 14px; color: var(--accent); }
  .dots { display: flex; gap: 8px; margin-top: 8px; }
  .dot { width: 10px; height: 10px; border-radius: 50%; background: var(--accent); animation: pulse 1.2s ease-in-out infinite; }
  .dot:nth-child(2) { animation-delay: 0.3s; }
  .dot:nth-child(3) { animation-delay: 0.6s; }
  @keyframes pulse { 0%,100%{opacity:0.3;transform:scale(0.8)} 50%{opacity:1;transform:scale(1.2)} }

  /* ── ERROR ── */
  #error-screen {
    min-height: 100vh; background: var(--dark);
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 16px; padding: 24px; text-align: center;
  }
  .err-icon { font-size: 52px; }
  .err-msg { font-size: 16px; color: #fff; max-width: 280px; line-height: 1.5; }
  .err-detail { font-size: 12px; color: #64748b; max-width: 300px; line-height: 1.5; }
  .try-btn {
    background: var(--green); color: #fff; border: none; border-radius: 14px;
    padding: 14px 36px; font-size: 16px; font-weight: 700;
    font-family: 'DM Sans', sans-serif; cursor: pointer; margin-top: 8px;
  }

  /* ── RESULTS ── */
  #results { display: none; flex-direction: column; min-height: 100vh; }
  .results-header {
    background: linear-gradient(135deg, var(--green-dark) 0%, var(--green) 100%);
    padding: 20px 18px 18px; color: #fff;
    display: flex; justify-content: space-between; align-items: center;
    position: sticky; top: 0; z-index: 10;
    box-shadow: 0 2px 12px rgba(0,0,0,0.2);
  }
  .results-header-left .eyebrow { font-size: 10px; opacity: 0.6; letter-spacing: 0.12em; text-transform: uppercase; margin-bottom: 3px; }
  .results-header-left .title { font-family: 'Syne', sans-serif; font-size: 20px; }
  .results-header-left .date { font-size: 12px; opacity: 0.7; margin-top: 2px; }
  .rescan-btn {
    background: rgba(255,255,255,0.15); border: none; border-radius: 12px;
    padding: 9px 16px; color: #fff; font-size: 13px; font-weight: 600;
    font-family: 'DM Sans', sans-serif; cursor: pointer; white-space: nowrap;
  }

  .results-body { padding: 20px 16px 48px; flex: 1; }

  /* Notes banner */
  .notes-banner {
    background: var(--warn-bg); border: 1px dashed var(--warn-border);
    border-radius: 14px; padding: 14px 16px; margin-bottom: 20px;
  }
  .notes-banner .nb-label { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.08em; color: #92400e; margin-bottom: 4px; }
  .notes-banner .nb-text { font-size: 14px; color: #78350f; line-height: 1.6; }

  /* Summary table */
  .summary-card {
    background: var(--card); border-radius: 16px;
    box-shadow: 0 2px 12px rgba(0,0,0,0.07);
    overflow: hidden; margin-bottom: 24px;
    border: 1px solid var(--border);
  }
  .summary-header {
    background: var(--dark); padding: 12px 16px;
    color: #94a3b8; font-size: 11px; font-weight: 700;
    letter-spacing: 0.1em; text-transform: uppercase;
  }
  .summary-table { width: 100%; border-collapse: collapse; font-size: 13px; overflow-x: auto; display: block; }
  .summary-table th {
    padding: 9px 12px; text-align: left; color: #64748b;
    font-weight: 700; font-size: 11px; text-transform: uppercase; letter-spacing: 0.05em;
    border-bottom: 1px solid var(--border); background: #f8fafc; white-space: nowrap;
  }
  .summary-table td { padding: 10px 12px; border-bottom: 1px solid #f1f5f9; vertical-align: middle; }
  .summary-table tr:last-child td { border-bottom: none; }
  .summary-table tr:nth-child(even) td { background: #fafafa; }
  .tfoot-row td { background: var(--green-light) !important; font-weight: 800; color: var(--green); font-size: 15px; }
  .tfoot-label { text-align: right; color: var(--dark); font-size: 13px; }

  /* Section label */
  .section-label {
    font-size: 11px; font-weight: 700; color: #64748b;
    text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 12px;
  }

  /* Job card */
  .job-card {
    background: var(--card); border-radius: 18px;
    box-shadow: 0 4px 20px rgba(0,0,0,0.08);
    overflow: hidden; margin-bottom: 16px;
    border: 1px solid var(--border);
  }
  .jc-header {
    background: linear-gradient(135deg, var(--green-dark) 0%, var(--green) 100%);
    padding: 16px 18px; color: #fff;
    display: flex; justify-content: space-between; align-items: flex-start;
  }
  .jc-num { font-size: 10px; opacity: 0.6; letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 3px; }
  .jc-name { font-family: 'Syne', sans-serif; font-size: 19px; line-height: 1.2; }
  .jc-phone { font-size: 12px; opacity: 0.8; margin-top: 4px; }
  .jc-fee {
    background: rgba(255,255,255,0.18); border-radius: 12px;
    padding: 6px 12px; font-size: 17px; font-weight: 800;
    text-align: center; white-space: nowrap; flex-shrink: 0;
  }
  .jc-fee-sub { font-size: 9px; opacity: 0.7; letter-spacing: 0.05em; }

  .jc-body { padding: 16px 18px; }
  .jc-time-row {
    display: flex; gap: 0; margin-bottom: 14px;
    background: #f0fdf4; border-radius: 12px;
    border: 1px solid #bbf7d0; overflow: hidden;
  }
  .jc-time-cell { flex: 1; padding: 12px 14px; }
  .jc-time-cell + .jc-time-cell { border-left: 1px solid #bbf7d0; }
  .jc-time-label { font-size: 10px; color: #6b7280; text-transform: uppercase; letter-spacing: 0.07em; margin-bottom: 2px; }
  .jc-time-val { font-size: 14px; font-weight: 700; color: var(--dark); }

  .jc-field { margin-bottom: 12px; }
  .jc-field-label { font-size: 10px; color: #6b7280; text-transform: uppercase; letter-spacing: 0.07em; margin-bottom: 4px; }
  .jc-field-val { font-size: 14px; color: var(--dark); line-height: 1.5; }

  .jc-details-box {
    background: var(--warn-bg); border: 1px solid var(--warn-border);
    border-radius: 10px; padding: 10px 12px;
    font-size: 14px; line-height: 1.6; color: #78350f;
  }

  .notes-toggle {
    background: none; border: 1px solid var(--border); border-radius: 8px;
    padding: 7px 12px; font-size: 12px; color: var(--mid);
    cursor: pointer; font-family: 'DM Sans', sans-serif;
    display: flex; align-items: center; gap: 6px; margin-top: 4px;
  }
  .hw-notes {
    margin-top: 8px; background: #fafafa; border: 1px dashed var(--border);
    border-radius: 10px; padding: 10px 12px;
    font-size: 13px; color: #374151; line-height: 1.6; font-style: italic;
    display: none;
  }
  .hw-notes.open { display: block; }

  /* hidden */
  .hidden { display: none !important; }
</style>
</head>
<body>

<!-- SETUP -->
<div id="setup" class="hidden">
  <div style="min-height:100vh;background:linear-gradient(160deg,#071810 0%,#1a3a2a 55%,#0f172a 100%);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px 24px;text-align:center">
    <span style="font-size:52px;display:block;margin-bottom:16px">🔑</span>
    <div style="font-family:Syne,sans-serif;font-size:26px;color:#fff;margin-bottom:8px">API Key Setup</div>
    <div style="font-size:14px;color:#52b788;margin-bottom:32px">Enter your Anthropic API key to get started.<br>It stays on your device only.</div>
    <input id="keyInput" type="password" placeholder="sk-ant-api03-..." style="width:100%;max-width:320px;padding:14px 16px;border-radius:14px;border:1px solid #2d6a4f;background:#0f2417;color:#fff;font-size:14px;font-family:DM Sans,sans-serif;margin-bottom:8px;outline:none">
    <div id="keyError" style="color:#f87171;font-size:12px;margin-bottom:12px;min-height:16px"></div>
    <button onclick="submitKey()" style="width:100%;max-width:320px;background:#2d6a4f;color:#fff;border:none;border-radius:16px;padding:18px;font-size:17px;font-weight:700;font-family:DM Sans,sans-serif;cursor:pointer">Save &amp; Continue</button>
  </div>
</div>

<!-- HOME -->
<div id="home">
  <div class="logo-wrap">
    <span class="logo-icon">🐀</span>
    <div class="logo-title">Evict-A-Pest</div>
    <div class="logo-sub">Job Sheet Scanner</div>
  </div>
  <input type="file" id="fileInput" accept="image/*" capture="environment" style="display:none">
  <button class="scan-btn" onclick="document.getElementById('fileInput').click()">
    📷 Scan Job Sheet
  </button>
  <div class="scan-hint">Take a photo or choose from your camera roll</div>
</div>

<!-- SCANNING -->
<div id="scanning" class="hidden">
  <div class="scan-icon">🔍</div>
  <div class="scan-title">Reading your job sheet…</div>
  <div class="scan-desc">Compressing &amp; sending to Claude</div>
  <div class="dots">
    <div class="dot"></div><div class="dot"></div><div class="dot"></div>
  </div>
</div>

<!-- ERROR -->
<div id="error-screen" class="hidden">
  <div class="err-icon">😕</div>
  <div class="err-msg" id="errMsg">Couldn't read the job sheet.</div>
  <div class="err-detail" id="errDetail"></div>
  <button class="try-btn" onclick="goHome()">Try Again</button>
</div>

<!-- RESULTS -->
<div id="results">
  <div class="results-header">
    <div class="results-header-left">
      <div class="eyebrow">Evict-A-Pest</div>
      <div class="title">Today's Jobs</div>
      <div class="date" id="sheetDate"></div>
    </div>
    <button class="rescan-btn" onclick="goHome()">📷 Rescan</button>
  </div>
  <div class="results-body" id="resultsBody"></div>
</div>

<script>
function getApiKey() { return localStorage.getItem('eap_api_key') || ''; }
function saveApiKey(k) { localStorage.setItem('eap_api_key', k); }

function submitKey() {
  const val = document.getElementById('keyInput').value.trim();
  if (!val.startsWith('sk-ant-')) { document.getElementById('keyError').textContent = 'Key should start with sk-ant-'; return; }
  saveApiKey(val);
  show('home');
}

window.addEventListener('load', () => { if (!getApiKey()) show('setup'); else show('home'); });

function show(id) {
  ['setup','home','scanning','error-screen','results'].forEach(s => {
    const el = document.getElementById(s);
    if (s === id) { el.classList.remove('hidden'); if (s === 'results') el.style.display = 'flex'; }
    else { el.classList.add('hidden'); if (s === 'results') el.style.display = 'none'; }
  });
}

function goHome() { show('home'); document.getElementById('fileInput').value = ''; }

// Compress image using canvas
function compressImage(file, maxWidth = 1200, quality = 0.75) {
  return new Promise((resolve, reject) => {
    const img = new Image();
    const url = URL.createObjectURL(file);
    img.onload = () => {
      const scale = Math.min(1, maxWidth / img.width);
      const canvas = document.createElement('canvas');
      canvas.width = img.width * scale;
      canvas.height = img.height * scale;
      const ctx = canvas.getContext('2d');
      ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
      URL.revokeObjectURL(url);
      canvas.toBlob(blob => {
        const reader = new FileReader();
        reader.onload = () => resolve(reader.result.split(',')[1]);
        reader.onerror = reject;
        reader.readAsDataURL(blob);
      }, 'image/jpeg', quality);
    };
    img.onerror = reject;
    img.src = url;
  });
}

document.getElementById('fileInput').addEventListener('change', async (e) => {
  const file = e.target.files[0];
  if (!file) return;
  show('scanning');

  try {
    // Compress image before sending
    const base64 = await compressImage(file);

    const response = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-api-key': getApiKey(),
        'anthropic-version': '2023-06-01',
        'anthropic-dangerous-direct-browser-access': 'true'
      },
      body: JSON.stringify({
        model: 'claude-sonnet-4-5-20250929',
        max_tokens: 2000,
        messages: [{
          role: 'user',
          content: [
            { type: 'image', source: { type: 'base64', media_type: 'image/jpeg', data: base64 } },
            { type: 'text', text: `You are a job sheet reader for a pest control company. Extract all jobs from this job sheet image.

Return ONLY a valid JSON object, no markdown, no explanation, no backticks:
{
  "date": "the date of the jobs if visible",
  "handwrittenNotes": "any handwritten notes not part of the printed table",
  "jobs": [
    {
      "customerName": "",
      "phone": "",
      "address": "",
      "start": "",
      "finish": "",
      "worker": "",
      "feeCharged": "",
      "jobDetails": "",
      "status": "",
      "handwrittenNotes": ""
    }
  ]
}

Rules:
- Extract every job row
- feeCharged: number only e.g. "200"
- Combine all job detail text including pest type, notes, instructions
- Handwritten notes near a job row go in that job's handwrittenNotes
- Sheet-level handwritten notes go in top-level handwrittenNotes
- Empty string for missing fields, never null` }
          ]
        }]
      })
    });

    const data = await response.json();

    if (!response.ok || data.error) {
      throw new Error(data.error?.message || `API error ${response.status}`);
    }

    const text = data.content.map(b => b.text || '').join('');
    const jsonMatch = text.match(/\{[\s\S]*\}/);
    if (!jsonMatch) throw new Error('No JSON in response');

    const parsed = JSON.parse(jsonMatch[0]);
    renderResults(parsed);
    show('results');

  } catch (err) {
    document.getElementById('errMsg').textContent = 'Couldn\'t read the job sheet.';
    document.getElementById('errDetail').textContent = err.message || '';
    show('error-screen');
  }
});

function renderResults(data) {
  const jobs = data.jobs || [];
  const body = document.getElementById('resultsBody');
  document.getElementById('sheetDate').textContent = data.date || '';

  let html = '';

  // Global handwritten notes
  if (data.handwrittenNotes) {
    html += `<div class="notes-banner">
      <div class="nb-label">✏️ Sheet Notes</div>
      <div class="nb-text">${esc(data.handwrittenNotes)}</div>
    </div>`;
  }

  // Summary table
  const total = jobs.reduce((s, j) => s + (parseFloat(j.feeCharged) || 0), 0);
  html += `<div class="summary-card">
    <div class="summary-header">📋 Day Summary — ${jobs.length} Job${jobs.length !== 1 ? 's' : ''}</div>
    <div style="overflow-x:auto">
    <table class="summary-table">
      <thead><tr>
        <th>#</th><th>Customer</th><th>Start</th><th>Job</th><th>Fee</th>
      </tr></thead>
      <tbody>`;

  jobs.forEach((j, i) => {
    const shortJob = j.jobDetails ? j.jobDetails.split(' ').slice(0,5).join(' ') + '…' : '—';
    const startShort = j.start ? j.start.replace(/:00$/, '').replace(/:\d{2}$/, '') : '—';
    html += `<tr>
      <td style="color:#94a3b8;font-weight:700">${i+1}</td>
      <td style="font-weight:600;color:var(--dark)">${esc(j.customerName||'—')}</td>
      <td style="white-space:nowrap;color:var(--mid)">${esc(startShort)}</td>
      <td style="color:var(--mid);max-width:130px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(shortJob)}</td>
      <td style="font-weight:700;color:var(--green)">${j.feeCharged ? '$'+j.feeCharged : '—'}</td>
    </tr>`;
  });

  html += `</tbody><tfoot><tr class="tfoot-row">
    <td colspan="4" class="tfoot-label">Total</td>
    <td>$${total.toFixed(0)}</td>
  </tr></tfoot></table></div></div>`;

  // Section label
  html += `<div class="section-label">Job Cards — scroll to view all</div>`;

  // Job cards
  jobs.forEach((j, i) => {
    html += `<div class="job-card">
      <div class="jc-header">
        <div>
          <div class="jc-num">Job ${i+1}</div>
          <div class="jc-name">${esc(j.customerName||'—')}</div>
          ${j.phone ? `<div class="jc-phone">📞 ${esc(j.phone)}</div>` : ''}
        </div>
        ${j.feeCharged ? `<div class="jc-fee">$${esc(j.feeCharged)}<div class="jc-fee-sub">+ GST</div></div>` : ''}
      </div>
      <div class="jc-body">
        <div class="jc-time-row">
          <div class="jc-time-cell">
            <div class="jc-time-label">Start</div>
            <div class="jc-time-val">${esc(j.start||'—')}</div>
          </div>
          <div class="jc-time-cell">
            <div class="jc-time-label">Finish</div>
            <div class="jc-time-val">${esc(j.finish||'—')}</div>
          </div>
          ${j.worker ? `<div class="jc-time-cell">
            <div class="jc-time-label">Worker</div>
            <div class="jc-time-val">${esc(j.worker)}</div>
          </div>` : ''}
        </div>
        ${j.address ? `<div class="jc-field">
          <div class="jc-field-label">📍 Address</div>
          <div class="jc-field-val">${esc(j.address)}</div>
        </div>` : ''}
        ${j.jobDetails ? `<div class="jc-field">
          <div class="jc-field-label">🔧 Job Details</div>
          <div class="jc-details-box">${esc(j.jobDetails)}</div>
        </div>` : ''}
        ${j.handwrittenNotes ? `
          <button class="notes-toggle" onclick="toggleNotes(this)">✏️ Handwritten Notes ▼</button>
          <div class="hw-notes">${esc(j.handwrittenNotes)}</div>
        ` : ''}
      </div>
    </div>`;
  });

  body.innerHTML = html;
}

function toggleNotes(btn) {
  const notes = btn.nextElementSibling;
  notes.classList.toggle('open');
  btn.textContent = notes.classList.contains('open')
    ? '✏️ Handwritten Notes ▲'
    : '✏️ Handwritten Notes ▼';
}

function esc(str) {
  return String(str||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
</script>
</body>
</html>
